<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Blokus</title>

		<link rel="stylesheet" href="css/style.css">

		<script src="https://code.jquery.com/jquery-4.0.0.js"></script>
		<script type="module" src="./js/main.js"></script>
	</head>

	<body>
		<div id="headerContainer">
			<h1>Welcome to BLOKUS, a turn based board game</h1>
		</div>

		<div id="gameContainer">

			<div id="gameInfoContainer">
				<h3>p1:</h3>
				<h3>p2:</h3>
				<h3>p3:</h3>
				<h3>p4:</h3>
			</div>

			<div id="boardContainer">
				<div id="game">
				</div>
			</div>

			<div id="sidePanel">
				<div class="blokus-button" id="playerLabel"></div>
				<div id="pieceContainer"></div>
			</div>
		</div>


		<div id="settingsContainer" style="display:none">

		</div>


		<div id="tilesetOptionsContainer" style="display:none">

		</div>


		<div id="buttonContainer">
			<div class="blokus-button hoverable" id="game-view">Game</div>
			<div class="blokus-button hoverable" id="settings-view">Settings</div>
			<div class="blokus-button hoverable" id="tileset-view">Tileset</div>
			<div class="blokus-button hoverable" id="reset-button">Reset Board</div>
		</div>


		<div id="cursor-piece" class="piece"></div>

	</body>

</html>
