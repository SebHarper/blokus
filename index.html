<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Blokus</title>
		
		<link rel="stylesheet" href="css/style.css">
		
		<script src="https://code.jquery.com/jquery-4.0.0.js"></script>
		<script src="js/game.js"></script>
		
	</head>

	<body>
		<div id="headerContainer">
			<h1>Welcome to BLOKUS, a turn based board game</h1>
		</div>
		<div id="gameContainer">
			<div id="boardContainer">
				<div id="game"></div>
			</div>
			
			<div id="sidePanel">
				
				<div id="pieceContainer">
					<div class="piece" data-piece="p1">
						<div class="cell empty"></div><div class="cell empty"></div>
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
					</div>
					<div class="piece" data-piece="p2">
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
					</div>
					<div class="piece" data-piece="p3">
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
					</div>
					<div class="piece" data-piece="p4">
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
						<div class="cell"></div><div class="cell"></div>
					</div>
					
				</div>

				<div id="reset-button" class="blokus-button">Reset Board</div>

			</div>
		</div>
		
		<div id="settingsContainer" style="display:none">
			
		</div>
		
		<div id="tilesetOptionsContainer" style="display:none">
			
		</div>
		
		<div id="buttonContainer">
			<div class="blokus-button" id="game-view">Game</div>
			<div class="blokus-button" id="settings-view">Settings</div>
			<div class="blokus-button" id="tileset-view">Tileset</div>
		</div>
		
		<div id="cursor-piece" class="piece"></div>
	
	</body>

</html>
