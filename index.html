<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>Blokus</title>
		
		<link rel="stylesheet" href="css/style.css">
		
		<script src="https://code.jquery.com/jquery-4.0.0.js"></script>
		<script src="js/game.js"></script>
		
	</head>

	<body>
		<div class="headerContainer">
			<h1>Welcome to BLOKUS, a turn based board game</h1>
		</div>
		<div class="gameContainer">
			<div class="boardContainer">
				<div id="game"></div>
				<div id="reset-button" class="blokus-button">Reset Board</div>
			</div>
		</div>
		
		<div class="settingsContainer" style="display:none">
			
		</div>
		
		<div class="tilesetOptionsContainer" style="display:none">
			
		</div>
		
		<div class="buttonContainer">
			<div class="blokus-button" id="game-view">Game</div>
			<div class="blokus-button" id="settings-view">Settings</div>
			<div class="blokus-button" id="tileset-view">Tileset</div>
		</div>
	
	</body>

</html>
